name: Build iMusic IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep "Xcode" | sort -r | head -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project iMusic.xcodeproj \
            -scheme iMusic \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Inject icons into .app bundle
        run: |
          APP=$(find build/DerivedData -name "iMusic.app" -type d | head -1)
          ICONS="iMusic/Assets.xcassets/AppIcon.appiconset"

          cp "$ICONS/Icon-60@2x.png"   "$APP/AppIcon60x60@2x.png"
          cp "$ICONS/Icon-60@3x.png"   "$APP/AppIcon60x60@3x.png"
          cp "$ICONS/Icon-40@2x.png"   "$APP/AppIcon40x40@2x.png"
          cp "$ICONS/Icon-40@3x.png"   "$APP/AppIcon40x40@3x.png"
          cp "$ICONS/Icon-29@2x.png"   "$APP/AppIcon29x29@2x.png"
          cp "$ICONS/Icon-29@3x.png"   "$APP/AppIcon29x29@3x.png"
          cp "$ICONS/Icon-20@2x.png"   "$APP/AppIcon20x20@2x.png"
          cp "$ICONS/Icon-20@3x.png"   "$APP/AppIcon20x20@3x.png"
          cp "$ICONS/Icon-1024.png"    "$APP/AppIcon1024x1024.png"

          PLIST="$APP/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:UIPrerenderedIcon bool false" "$PLIST"

          echo "Injected icons:"
          ls "$APP"/AppIcon*.png

      - name: Package IPA
        run: |
          APP=$(find build/DerivedData -name "iMusic.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/iMusic.app
          zip -r iMusic.ipa Payload
          cp "iMusic/Assets.xcassets/AppIcon.appiconset/Icon-1024.png" iTunesArtwork
          zip iMusic.ipa iTunesArtwork
          rm -rf Payload iTunesArtwork

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "iMusic build #${{ github.run_number }}"
          prerelease: true
          generate_release_notes: false
          files: iMusic.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
