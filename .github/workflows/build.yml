name: Build iMusic IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project iMusic.xcodeproj \
            -scheme iMusic \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package .app into zip
        run: |
          APP_PATH=$(find build/DerivedData -name "iMusic.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/iMusic.app
          zip -r iMusic.ipa Payload
          rm -rf Payload

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "iMusic build #${{ github.run_number }}"
          prerelease: true
          generate_release_notes: false
          files: iMusic.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
