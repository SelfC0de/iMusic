name: Build iMusic IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications | grep "Xcode" | sort -r | head -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "/Applications/$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Build
        run: |
          xcodebuild \
            -project iMusic.xcodeproj \
            -scheme iMusic \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Inject icons into .app bundle
        run: |
          APP_PATH=$(find build/DerivedData -name "iMusic.app" -type d | head -1)
          echo "App: $APP_PATH"
          ICON_SRC="iMusic/Assets.xcassets/AppIcon.appiconset"

          # Copy all sizes into .app root with iOS-standard names
          cp "$ICON_SRC/icon_120.png"  "$APP_PATH/AppIcon60x60@2x.png"
          cp "$ICON_SRC/icon_180.png"  "$APP_PATH/AppIcon60x60@3x.png"
          cp "$ICON_SRC/icon_80.png"   "$APP_PATH/AppIcon40x40@2x.png"
          cp "$ICON_SRC/icon_87.png"   "$APP_PATH/AppIcon40x40@3x.png"
          cp "$ICON_SRC/icon_58.png"   "$APP_PATH/AppIcon29x29@2x.png"
          cp "$ICON_SRC/icon_87.png"   "$APP_PATH/AppIcon29x29@3x.png"
          cp "$ICON_SRC/icon_40.png"   "$APP_PATH/AppIcon20x20@2x.png"
          cp "$ICON_SRC/icon_60.png"   "$APP_PATH/AppIcon20x20@3x.png"
          cp "$ICON_SRC/icon_1024.png" "$APP_PATH/AppIcon1024x1024.png"

          # Patch Info.plist inside .app
          PLIST="$APP_PATH/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 string AppIcon60x60" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:UIPrerenderedIcon bool false" "$PLIST"

          echo "Icons in .app:"
          ls "$APP_PATH"/AppIcon*.png

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name "iMusic.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/iMusic.app
          zip -r iMusic.ipa Payload

          # iTunesArtwork — used by Sideloadly and iTunes to show icon preview
          # Must be in IPA root, no extension, PNG format
          cp "iMusic/Assets.xcassets/AppIcon.appiconset/icon_1024.png" iTunesArtwork
          zip iMusic.ipa iTunesArtwork
          rm -rf Payload iTunesArtwork

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "iMusic build #${{ github.run_number }}"
          prerelease: true
          generate_release_notes: false
          files: iMusic.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
